<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Log In</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('https://substackcdn.com/image/fetch/$s_!Ging!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F900c1e15-115b-40f4-9771-e19dd85f87e4_4058x2659.png') 
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        
        .login-box {
            background-color: rgba(0, 0, 0, 0.85); 
            padding: 40px;
            border-radius: 12px; 
            border: 1px solid rgba(229, 160, 13, 0.3); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            width: 350px; 
            text-align: center;
            color: #fff; 
        }

        .login-box h2 {
            color: #e5a00d; 
            margin-bottom: 25px;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            color: #fff;
            margin-bottom: 15px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .login-box input:focus {
            border-color: #e5a00d;
            outline: none;
        }
        .login-btn {
            display: inline-block;
            background-color: #e5a00d;
            color: #000;
         text-decoration: none;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 4px;
            width: 92.5%;
            border: none;
            font-size: 1.1rem;
            text-align: center;
        }

        .login-btn:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>LOG IN</h2>
        <form action="index.html">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="login-btn" style="width: 100%; cursor: pointer;">ENTER</button>
        </form>
    </div>

</body>
</html>
