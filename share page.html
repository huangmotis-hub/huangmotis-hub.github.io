<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Upload Your Poster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="full-nav">
            <ul>
                <li><a href="First page.html">Home</a></li>
                <li><a href="Show page.html">Share</a></li>
                <li><a href="share page.html">Your lover</a></li>
            </ul>
        </nav>
    </header>

    <main class="three-column-layout">
    <div class="column">
        <h2 style="color: #e5a00d;">SHARE YOUR DISCOVERY</h2>
        <p style="color: #bbb;">Upload your collection and let others explore your subconscious.</p>
    </div>

    <div class="column">
        <h3 style="color: #e5a00d; margin-bottom: 20px;">NEW POST</h3>
        <form action="#" style="width: 100%; max-width: 500px; text-align: left;">
            <label style="color: #fff; display: block; margin-bottom: 5px;">Post Title</label>
            <input type="text" placeholder="Enter title..." style="width: 100%; padding: 10px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: #fff;">
            
            <label style="color: #fff; display: block; margin-bottom: 5px;">Movie Poster</label>
            <input type="file" style="margin-bottom: 15px; color: #888;">
            
            <label style="color: #fff; display: block; margin-bottom: 5px;">Description</label>
            <textarea style="width: 100%; height: 80px; background: #222; border: 1px solid #444; color: #fff; padding: 10px;"></textarea>
            
            <button type="submit" class="submit-btn">Upload to Archives</button>
        </form>
    </div>

    <div class="column">
        <h3 style="color: #e5a00d;">SUGGESTION</h3>
        <p style="font-family: monospace; color: #666;">> YOUR SUGGESTION IS IMPORTANT TO US <br> > bustermate.kerjoff@gmail.com</p>
    </div>
</main>

</body>
</html>
